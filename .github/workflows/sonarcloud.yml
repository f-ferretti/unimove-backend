name: SonarCloud

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: unimove_db
          POSTGRES_USER: unimove_user
          POSTGRES_PASSWORD: unimove_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build, Test & JaCoCo Report
        run: mvn -B clean verify

      - name: SonarCloud Scan
        run: mvn -B sonar:sonar
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.organization=unimoveapp
          -Dsonar.projectKey=UniMoveApp_unimove-backend
          -Dsonar.host.url=https://sonarcloud.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}