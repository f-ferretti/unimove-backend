version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: unimove_postgres
    environment:
      POSTGRES_DB: unimove_db
      POSTGRES_USER: unimove_user
      POSTGRES_PASSWORD: unimove_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: