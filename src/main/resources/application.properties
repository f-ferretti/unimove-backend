# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/unimove_db
spring.datasource.username=unimove_user
spring.datasource.password=unimove_pass

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG

# JWT
jwt.secret=3d8f2b1c9e4a7f6d0b5e8c2a1f4d7e0b3c6a9f2d5e8b1c4a7f0d3e6b9c2a5f8
